name: 'task_example'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ['CMD-SHELL', 'echo srvr | timeout 2 /bin/bash -c "exec 3<>/dev/tcp/localhost/2181; printf srvr >&3; cat <&3" | grep -q Mode']
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - '9092:9092'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: kafka-broker-api-versions --bootstrap-server localhost:9092
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tournaments
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    container_name: nats
    ports:
      - '4222:4222'
      - '8222:8222'
    command: '--http_port 8222'
    healthcheck:
      test: wget --quiet --tries=1 --spider http://localhost:8222/healthz || exit 1
      interval: 10s
      timeout: 5s
      retries: 5

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile.develop
    container_name: user-service
    depends_on:
      nats:
        condition: service_healthy
    environment:
      NATS_URL: nats://nats:4222
      NODE_ENV: development
      KAFKAJS_NO_PARTITIONER_WARNING: 1
    volumes:
      - ./user-service/src:/app/src
      - /app/node_modules

  tournament-service:
    build:
      context: ./tournament-service
      dockerfile: Dockerfile.develop
    container_name: tournament-service
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      user-service:
        condition: service_started
    environment:
      KAFKA_BROKERS: kafka:29092
      NATS_URL: nats://nats:4222
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/tournaments
      NODE_ENV: development
      KAFKAJS_NO_PARTITIONER_WARNING: 1
    volumes:
      - ./tournament-service/src:/app/src
      - /app/node_modules

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile.develop
    container_name: gateway
    depends_on:
      kafka:
        condition: service_healthy
      tournament-service:
        condition: service_started
    ports:
      - '3000:3000'
    environment:
      KAFKA_BROKERS: kafka:29092
      PORT: 3000
      NODE_ENV: development
      KAFKAJS_NO_PARTITIONER_WARNING: 1
    volumes:
      - ./gateway/src:/app/src
      - /app/node_modules


  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    ports:
      - '9999:8080'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock


  adminer:
    image: adminer:latest
    container_name: adminer
    ports:
      - '8080:8080'
    depends_on:
      - postgres

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - '8090:8080'
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    depends_on:
      kafka:
        condition: service_healthy


  nats-box:
    image: natsio/nats-box:latest
    container_name: nats-box
    depends_on:
      - nats
    command: nats sub ">" --server nats://nats:4222

volumes:
  postgres_data: